<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nimio</title>
  </head>
  <body>
    <input
      id="streamURL"
      type="text"
      style="width: 408px; height: 30px; font-size: 16px"
      class="nimio-input"
      placeholder="ws:// or wss:// URL of the stream"
      value="wss://demo-nimble.softvelum.com/live/bbb"
    />
    <button
      id="initNimioButton"
      class="nimio-button"
      style="height: 36px; font-size: 16px; margin-left: 4px"
    >
      Load
    </button>
    <br />
    <br />
    <div style="display: inline-flex; width: 60%">
      <div id="video" style="width: calc(100% - 80px)"></div>
      <div id="vu-meter" style="width: 80px; height: 268px"></div>
    </div>
    <div style="padding: 10px; display: none" id="screenshot_container">
      <canvas width="100" height="100" id="screenshot_view"></canvas>
    </div>
    <script type="module">
      import Nimio from "/src/nimio.js";

      function initNimio() {
        if (window.nimio) window.nimio.destroy();

        const streamUrl = document.getElementById("streamURL").value;
        window.nimio = new Nimio({
          streamUrl: streamUrl,
          container: "video",
          autoplay: true,
          width: "100%",
          height: 480,
          latency: 1000,
          latencyTolerance: 2000,
          startOffset: 2000,
          // syncBuffer: 3000,
          // videoOnly: true,
          // audioOnly: true,
          metricsOverlay: true,
          logLevel: "debug",
          // muted: true,
          // offscreenCanvas: true,
          // hardwareAcceleration: true,
          adaptiveBitrate: {
            initialRendition: "720p",
          },
          vuMeter: {
            container: "vu-meter",
            type: "input",
          },
          workletLogs: true,
          latencyAdjustMethod: "fast-forward", // "fast-forward" | "seek"
          splashScreen: "splash.jpg",

          vod: {
            startupVodFailover: true,
            thumbnails: true,
          },

          captions: {
            CC1: { name: "First track", lang: "English", default: true },
            CC2: { name: "Second track", lang: "French" },
          },

          timecodes: true,

          // aspectRatio: "3:1",
          // screenshots: { rate: 1.0 },
        });

        window.nimio.on("nimio:play", () => {
          console.log("Nimio play event");
        });
        // window.nimio.on("nimio:captions-arrived", (caps, curTime) => {
        //   console.log("Nimio captions arrived", caps, curTime);
        // });
        // window.nimio.on("nimio:sei-timecode", (frameTs, clockTs, stringTs, mode) => {
        //   console.log("Nimio sei timecode arrived", frameTs, clockTs, stringTs, mode);
        // });
        window.nimio.on("nimio:screenshot", (imageData, ts) => {
          let w = imageData.width;
          let h = imageData.height;
          console.log(`Screenshot ready ${ts} ${w} * ${h}`);
          let container = document.getElementById("screenshot_container");
          container.style.display = "block";
          let canvas = document.getElementById("screenshot_view");
          canvas.width = imageData.width;
          canvas.height = imageData.height;
          const ctx = canvas.getContext("2d");
          ctx.putImageData(imageData, 0, 0);
        });
      }

      document
        .getElementById("initNimioButton")
        .addEventListener("click", initNimio);
    </script>
  </body>
</html>
